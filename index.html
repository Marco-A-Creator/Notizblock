<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notizblock</title>

    <link rel="icon" href="./assets/icons/notizblock-icon.png" type="image/svg" />

    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/standard.css" />
    <link rel="stylesheet" href="./styles/variablen.css" />
    <link rel="stylesheet" href="./styles/note.css" />

    <script src="./scripts/templates.js"></script>
    <script src="./script.js"></script>
</head>

<body>
    <header>
        <img src="./assets/icons/notizblock-icon.png" alt="Notizblock Icon">

    </header>

    <main>
        <div class="note-area">
            <h1>📝 Mein Notizblock</h1>

            <div class="note-input">
                <textarea id="noteText" placeholder="Neue Notiz schreiben..."></textarea>
                <button class="add-btn" onclick="addNote()">Hinzufügen</button>
            </div>

            <h2 class="section-title">Aktive Notizen</h2>
            <div class="notes" id="activeNotes"></div>

            <h2 class="section-title">Archivierte Notizen</h2>
            <div class="notes" id="archivedNotes"></div>

            <h2 class="section-title">Gelöschte Notizen</h2>
            <div class="notes" id="deletedNotes"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Mein Notizblock. Alle Rechte vorbehalten.</p>
    </footer>

</body>

</html>
